<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>clip_bot</title>
<style>
  :root { --bg:#0f1117; --card:#191c26; --line:#2b3040; --fg:#eef1f7;
          --mut:#98a2b3; --acc:#6d5efc; --acc2:#8b7bff; --ok:#28c76f; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
         background:var(--bg); color:var(--fg); padding:24px 16px; }
  .wrap { max-width:560px; margin:0 auto; }
  h1 { text-align:center; font-size:1.9rem; margin:0 0 4px; }
  h1 span { color:var(--acc2); }
  .sub { text-align:center; color:var(--mut); margin:0 0 26px; font-size:.95rem; }
  .card { background:var(--card); border:1px solid var(--line);
          border-radius:16px; padding:22px; }
  label { display:block; font-weight:600; margin:20px 0 8px; font-size:1rem; }
  label:first-child { margin-top:0; }
  .hint { color:var(--mut); font-weight:400; font-size:.85rem; display:block; margin-top:2px; }
  input, textarea { width:100%; background:#10141d; color:var(--fg);
          border:1px solid var(--line); border-radius:12px; padding:14px;
          font-size:1rem; font-family:inherit; }
  textarea { resize:vertical; min-height:120px; line-height:1.6; }
  .chk { display:flex; gap:12px; margin-top:4px; }
  .chk span { flex:1; }
  .chk input { display:none; }
  .chk label { margin:0; text-align:center; padding:13px; border:2px solid var(--line);
          border-radius:12px; cursor:pointer; color:var(--mut); font-weight:600; }
  .chk input:checked + label { border-color:var(--acc); color:var(--fg);
          background:rgba(109,94,252,.12); }
  button { width:100%; background:var(--acc); color:#fff; border:0; border-radius:14px;
           padding:17px; font-size:1.1rem; font-weight:700; cursor:pointer; margin-top:26px; }
  button:active { transform:scale(.99); }
  .copy { background:var(--ok); }
  .out { background:#0b0e14; border:1px solid var(--line); border-radius:12px;
         padding:16px; white-space:pre-wrap; word-break:break-word;
         font-family:ui-monospace,Menlo,Consolas,monospace; font-size:.85rem; color:#cfe3ff; }
  #outcard { margin-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>🎬 clip_<span>bot</span></h1>
  <p class="sub">Paste karo → Generate → Copy → Claude ko bhejo</p>

  <div class="card">
    <label>1. Campaign ka naam
      <span class="hint">(kuch bhi, pehchान ke liye)</span></label>
    <input id="name" placeholder="will.i.am Interview">

    <label>2. Kahan post karna hai?</label>
    <div class="chk">
      <span><input type="checkbox" id="ig" checked><label for="ig">📷 Instagram</label></span>
      <span><input type="checkbox" id="yt"><label for="yt">▶️ YouTube</label></span>
    </div>

    <label>3. Source video links
      <span class="hint">(YouTube URLs — ek line me ek. Yahi clip honge.)</span></label>
    <textarea id="sources" placeholder="https://www.youtube.com/watch?v=...
https://www.youtube.com/watch?v=..."></textarea>

    <label>Koi rule? <span class="hint">(optional — jaise: text overlay "will.i.am", hashtags, max 4 posts)</span></label>
    <textarea id="notes" style="min-height:70px" placeholder="Optional — khaali bhi chhod sakte ho"></textarea>

    <button onclick="gen()">Generate ⚙️</button>
  </div>

  <div class="card" id="outcard" style="display:none">
    <div class="out" id="out"></div>
    <button class="copy" onclick="copyOut()">Copy karo 📋</button>
  </div>
</div>

<script>
  const F = ['name','sources','notes'];
  window.addEventListener('load', () => {
    try {
      const s = JSON.parse(localStorage.getItem('clipbot') || '{}');
      F.forEach(id => { if (s[id]) document.getElementById(id).value = s[id]; });
      if (s.ig !== undefined) document.getElementById('ig').checked = s.ig;
      if (s.yt !== undefined) document.getElementById('yt').checked = s.yt;
    } catch (e) {}
  });
  function gen() {
    const v = id => document.getElementById(id).value.trim();
    const s = {}; F.forEach(id => s[id] = v(id));
    s.ig = document.getElementById('ig').checked; s.yt = document.getElementById('yt').checked;
    localStorage.setItem('clipbot', JSON.stringify(s));

    const plats = []; if (s.ig) plats.push('Instagram'); if (s.yt) plats.push('YouTube');
    const srcs = v('sources').split('\n').map(x => x.trim()).filter(Boolean)
                  .map((u,i) => `  ${i+1}. ${u}`).join('\n') || '  (koi nahi)';
    document.getElementById('out').textContent =
`=== CLIP_BOT CAMPAIGN ===
Name    : ${v('name') || '-'}
Post to : ${plats.join(', ') || '-'}
Rules   : ${v('notes') || '-'}
Sources:
${srcs}
=========================`;
    document.getElementById('outcard').style.display = 'block';
    document.getElementById('outcard').scrollIntoView({behavior:'smooth'});
  }
  function copyOut() {
    navigator.clipboard.writeText(document.getElementById('out').textContent);
    const b = event.target; b.textContent = 'Copied ✓';
    setTimeout(() => b.textContent = 'Copy karo 📋', 1500);
  }
</script>
</body>
</html>
